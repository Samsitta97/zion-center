# Zion Center — Nginx reverse proxy with SSL termination
# Replace YOUR_DOMAIN with your actual domain (e.g. api.zioncenter.com)
# Certificates managed by Certbot / Let's Encrypt

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — SSL termination + proxy to Spring Boot
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # --- Certificates (Let's Encrypt via Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # --- SSL hardening ---
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-XSS-Protection          "1; mode=block"                       always;

    # --- Proxy to Spring Boot ---
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Forward real client info so Spring can read it via X-Forwarded-* headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # --- Block public access to all actuator endpoints except /health ---
    location /actuator/ {
        deny all;
    }
    location /actuator/health {
        proxy_pass http://127.0.0.1:8080/actuator/health;
        proxy_set_header Host $host;
    }
}
